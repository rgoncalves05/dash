<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DASH — Agenda Cultural — Mockup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -ms-overflow-style:none; scrollbar-width:none; }
  *::-webkit-scrollbar { display:none; }
  body { font-family:'Inter',sans-serif; background:#0a1628; min-height:100vh; margin:0; }
  .phone { width:100%; height:100vh; overflow:hidden; background:#0a1628; position:relative; }
  .status-bar { height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; font-size:12px; color:#fff; font-weight:600; }
  .screen { height:calc(100% - 44px); display:flex; flex-direction:column; position:relative; transition:opacity .3s; overflow:hidden; }
  .screen-scroll { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
  .screen.hidden { display:none; }
  .top-logo-bar { height:44px; display:flex; align-items:center; padding:0 16px; flex-shrink:0; }
  .top-logo-center { display:flex; align-items:center; }
  .top-logo-bar .top-logo-text { font-family:'Playfair Display',serif; font-size:24px; font-weight:200; color:#fff; letter-spacing:8px; line-height:1; }
  .top-logo-bar .top-logo-text i { font-style:italic; font-weight:100; }
  .top-logo-bar .top-tribo-badge { margin-left:auto; display:flex; align-items:center; gap:5px; background:#12233d; border-radius:20px; padding:4px 10px; font-size:12px; cursor:pointer; border:1px solid #1e3a5f; }
  /* Tab bar */
  .tab-bar { position:absolute; bottom:0; left:0; right:0; height:70px; background:linear-gradient(to top,#0a1628 80%,transparent); display:flex; justify-content:space-around; align-items:center; padding-bottom:8px; z-index:10; }
  .tab-btn { background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; opacity:.6; transition:all .2s; color:#94a3b8; }
  .tab-btn.active { opacity:1; transform:scale(1.1); }
  .tab-btn svg { width:22px; height:22px; color:#cbd5e1; }
  .tab-btn.active svg { stroke:#3b82f6; color:#3b82f6; }
  .tab-btn span { font-size:10px; color:#94a3b8; }
  .tab-btn.active span { color:#3b82f6; font-weight:700; }
  /* Categories */
  .cat-bar { display:flex; gap:0; padding:6px 12px; overflow-x:hidden; justify-content:space-between; }
  .cat-chip { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; flex:1; padding:6px 4px; border-radius:14px; border:1px solid #1e3a5f; background:transparent; cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; color:#94a3b8; margin:0 3px; }
  .cat-chip span.cat-label { font-size:8px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; }
  .cat-chip.active { background:var(--cat-color-bg); border-color:var(--cat-color); color:var(--cat-color); font-weight:600; }
  .cat-chip svg { width:16px; height:16px; color:inherit; }
  .sub-bar { display:flex; gap:8px; padding:4px 16px 8px; overflow-x:auto; }
  .sub-chip { padding:5px 12px; border-radius:12px; border:none; cursor:pointer; font-size:11px; font-weight:500; white-space:nowrap; flex-shrink:0; background:#12233d; color:#94a3b8; transition:all .2s; font-family:'Inter',sans-serif; }
  .sub-chip.active { background:#3b82f6; color:#fff; }
  /* Event cards */
  .event-list { flex:1; overflow:auto; padding:0 16px 80px; display:flex; flex-direction:column; gap:10px; }
  .event-card { display:flex; gap:12px; padding:12px; background:#12233d; border-radius:16px; border:none; cursor:pointer; width:100%; text-align:left; transition:transform .15s; }
  .event-card:hover { transform:scale(1.02); }
  .event-img { width:72px; height:96px; border-radius:12px; background:#1e3a5f; overflow:hidden; flex-shrink:0; }
  .event-img img { width:100%; height:100%; object-fit:cover; }
  .event-info { flex:1; min-width:0; }
  .event-title { font-size:15px; font-weight:600; color:#fff; margin-bottom:3px; }
  .event-genre { font-size:11px; color:#94a3b8; margin-bottom:6px; }
  .event-rating { display:flex; align-items:center; gap:4px; margin-bottom:4px; }
  .event-rating svg { width:12px; height:12px; fill:#f59e0b; stroke:#f59e0b; }
  .event-rating span { font-size:12px; color:#f59e0b; font-weight:600; }
  .event-meta { display:flex; gap:8px; flex-wrap:wrap; }
  .event-meta .date { font-size:11px; color:#64748b; display:flex; align-items:center; gap:3px; }
  .event-meta .price { font-size:11px; color:#22c55e; font-weight:600; display:flex; align-items:center; gap:3px; }
  /* Detail screen */
  .detail-hero { height:260px; background:#0a1628; position:relative; overflow:hidden; }
  .detail-hero img { width:100%; height:100%; object-fit:cover; opacity:.75; }
  .detail-hero .gradient { position:absolute; bottom:0; left:0; right:0; height:60%; background:linear-gradient(transparent,#0a1628); }
  .detail-hero .back-btn, .detail-hero .save-btn { position:absolute; top:12px; background:rgba(0,0,0,.5); border:none; border-radius:20px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; color:#fff; }
  .detail-hero .back-btn { left:12px; }
  .detail-hero .save-btn { right:12px; }
  .detail-hero .save-btn.saved { background:#3b82f6; }
  .detail-body { padding:20px; padding-bottom:100px; overflow:auto; flex:1; }
  .detail-title { font-size:22px; font-weight:700; color:#fff; }
  .detail-genre { font-size:13px; color:#94a3b8; margin:4px 0; }
  .info-cards { display:flex; gap:8px; margin:16px 0; }
  .info-card { flex:1; background:#12233d; border-radius:12px; padding:10px 8px; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; }
  .info-card svg { width:16px; height:16px; }
  .info-card span { font-size:10px; color:#fff; line-height:1.3; }
  .detail-desc { font-size:14px; color:#94a3b8; line-height:1.6; margin-bottom:20px; }
  .social-actions { display:flex; gap:12px; margin-bottom:20px; }
  .social-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px; background:#12233d; border-radius:12px; border:none; cursor:pointer; color:#94a3b8; font-size:12px; font-family:'Inter',sans-serif; transition:all .2s; }
  .social-btn.liked { background:rgba(239,68,68,.13); border:1px solid rgba(239,68,68,.27); color:#ef4444; }
  .cta-btn { width:100%; padding:16px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-size:16px; font-weight:700; border:none; border-radius:16px; cursor:pointer; letter-spacing:.5px; transition:all .3s; font-family:'Inter',sans-serif; }
  .cta-btn.bought { background:#22c55e; }
  /* Ver mais */
  .ver-mais-btn { background:none; border:none; color:#3b82f6; font-size:13px; cursor:pointer; padding:0; font-family:'Inter',sans-serif; }
  .extra-info { background:#0a1628; border-radius:12px; padding:12px 14px; margin-bottom:16px; display:flex; flex-direction:column; gap:7px; }
  .extra-row { display:flex; gap:8px; }
  .extra-label { font-size:11px; color:#64748b; width:90px; flex-shrink:0; }
  .extra-value { font-size:12px; color:#cbd5e1; flex:1; }
  /* Avaliacao */
  .rating-popup { background:#12233d; border-radius:16px; padding:16px; margin-bottom:16px; border:1px solid #1e3a5f; }
  .rating-popup-title { font-size:14px; font-weight:600; color:#fff; margin-bottom:10px; }
  .star-row { display:flex; gap:8px; justify-content:center; margin-bottom:10px; }
  .star-pick { background:none; border:none; cursor:pointer; font-size:28px; transition:transform .15s; }
  .star-pick:hover { transform:scale(1.2); }
  .rating-send-btn { width:100%; padding:10px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-size:14px; font-weight:700; border:none; border-radius:12px; cursor:pointer; font-family:'Inter',sans-serif; }
  /* Botao IA no detalhe */
  .detail-ai-btn { display:flex; align-items:center; gap:8px; width:100%; padding:12px 16px; background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(139,92,246,.15)); border:1px solid rgba(59,130,246,.3); border-radius:14px; color:#93c5fd; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:16px; font-family:'Inter',sans-serif; transition:all .2s; }
  .detail-ai-btn:hover { background:linear-gradient(135deg,rgba(59,130,246,.25),rgba(139,92,246,.25)); }
  /* Tribo selecionavel */
  .tribo-join-btn { padding:7px 12px; border-radius:20px; border:1px solid; font-size:11px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s; }
  /* Novo Post */
  .new-post-btn { display:flex; align-items:center; gap:10px; background:#12233d; border-radius:16px; padding:12px 14px; margin:0 16px 10px; cursor:pointer; border:1px dashed #1e3a5f; transition:all .2s; }
  .new-post-btn:hover { border-color:#3b82f6; }
  .new-post-btn span { font-size:13px; color:#64748b; }
  .post-compose { position:fixed; bottom:0; left:0; right:0; background:#0d1f3c; border-radius:20px 20px 0 0; padding:20px; z-index:100; border-top:1px solid #1e3a5f; animation:slideUp .3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .post-compose-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .post-compose-title { font-size:16px; font-weight:700; color:#fff; }
  .post-compose-close { background:none; border:none; font-size:22px; color:#64748b; cursor:pointer; }
  .post-compose textarea { width:100%; background:#12233d; border:1px solid #1e3a5f; border-radius:14px; padding:12px 14px; color:#fff; font-size:14px; font-family:'Inter',sans-serif; resize:none; outline:none; min-height:90px; margin-bottom:10px; }
  .post-compose-footer { display:flex; justify-content:space-between; align-items:center; }
  .post-char { font-size:12px; color:#64748b; }
  .post-submit-btn { padding:10px 24px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-size:14px; font-weight:700; border:none; border-radius:12px; cursor:pointer; font-family:'Inter',sans-serif; }
  /* Comments */
  .comments-section { margin-bottom:20px; }
  .comments-title { font-size:16px; font-weight:700; color:#fff; margin-bottom:12px; }
  .comments-title span { font-size:13px; font-weight:400; color:#64748b; }
  .comment-card { background:#12233d; border-radius:14px; padding:14px; margin-bottom:10px; }
  .comment-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .comment-avatar { width:32px; height:32px; border-radius:16px; background:#1e3a5f; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .comment-user { font-size:13px; font-weight:600; color:#fff; }
  .comment-time { font-size:11px; color:#64748b; margin-left:8px; }
  .comment-stars { display:flex; gap:2px; margin-left:auto; }
  .comment-stars svg { width:10px; height:10px; }
  .comment-text { font-size:13px; color:#94a3b8; line-height:1.5; margin-bottom:8px; }
  .comment-likes { display:flex; align-items:center; gap:4px; font-size:11px; color:#64748b; }
  .comment-likes svg { width:12px; height:12px; }
  /* Search */
  .search-input { display:flex; align-items:center; gap:8px; background:#12233d; border-radius:14px; padding:12px 16px; margin:0 16px 8px; }
  .search-input input { flex:1; background:none; border:none; outline:none; color:#fff; font-size:15px; font-family:'Inter',sans-serif; }
  .search-input .clear-btn { background:none; border:none; cursor:pointer; color:#64748b; font-size:18px; }
  .trending-label { font-size:14px; font-weight:600; color:#94a3b8; margin:8px 16px; }
  .trending-chips { display:flex; flex-wrap:wrap; gap:8px; padding:0 16px; }
  .trending-chip { padding:8px 16px; border-radius:20px; background:#12233d; border:1px solid #1e3a5f; color:#fff; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; }
  .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px; }
  .cat-grid-btn { padding:20px; border-radius:16px; border:1px solid; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .cat-grid-btn svg { width:28px; height:28px; }
  .cat-grid-btn span { font-size:13px; font-weight:600; }
  /* Agenda */
  .timeline-item { display:flex; gap:12px; margin-bottom:4px; }
  .timeline-line { display:flex; flex-direction:column; align-items:center; width:20px; }
  .timeline-dot { width:10px; height:10px; border-radius:5px; background:#3b82f6; flex-shrink:0; }
  .timeline-bar { width:2px; flex:1; background:#1e3a5f; }
  .timeline-content { flex:1; padding-bottom:16px; cursor:pointer; }
  .timeline-date { font-size:11px; color:#3b82f6; font-weight:600; }
  .timeline-card { background:#12233d; border-radius:14px; padding:14px; margin-top:6px; display:flex; gap:10px; align-items:center; }
  .timeline-card img { width:44px; height:44px; border-radius:10px; object-fit:cover; }
  .timeline-card .t-title { font-size:14px; font-weight:600; color:#fff; }
  .timeline-card .t-local { font-size:11px; color:#94a3b8; display:flex; align-items:center; gap:4px; margin-top:3px; }
  /* Profile */
  .profile-avatar { width:80px; height:80px; border-radius:40px; background:linear-gradient(135deg,#3b82f6,#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:36px; color:#fff; margin-bottom:12px; }
  .profile-stats { display:flex; gap:10px; margin-bottom:20px; }
  .stat-box { flex:1; background:#12233d; border-radius:16px; padding:16px 8px; text-align:center; }
  .stat-value { font-size:20px; font-weight:700; color:#3b82f6; }
  .stat-label { font-size:11px; color:#94a3b8; }
  .pref-tag { padding:6px 14px; border-radius:20px; background:rgba(59,130,246,.13); color:#60a5fa; font-size:12px; font-weight:500; border:none; cursor:pointer; }
  .activity-item { display:flex; align-items:center; gap:12px; padding:12px; background:#12233d; border-radius:14px; margin-bottom:8px; cursor:pointer; transition:transform .15s; }
  .activity-item:hover { transform:scale(1.02); }
  .activity-img { width:40px; height:40px; border-radius:10px; overflow:hidden; flex-shrink:0; background:#1e3a5f; }
  .activity-img img { width:100%; height:100%; object-fit:cover; }
  /* Login */
  .login-screen { height:100%; display:flex; flex-direction:column; justify-content:center; padding:0 32px; background:linear-gradient(180deg,#0a1628,#0d1f3c); }
  .login-logo { font-family:'Playfair Display',serif; font-size:48px; font-weight:200; color:#fff; letter-spacing:12px; text-align:center; }
  .login-logo i { font-weight:100; }
  .login-subtitle { font-size:11px; color:#94a3b8; letter-spacing:5px; font-weight:300; text-align:center; margin:6px 0 40px; }
  .login-field { display:flex; align-items:center; gap:10px; padding:14px 16px; background:#12233d; border-radius:14px; margin-bottom:12px; border:1px solid #1e3a5f; }
  .login-field input { flex:1; background:none; border:none; outline:none; color:#fff; font-size:15px; font-family:'Inter',sans-serif; }
  .login-field.shake { animation:shake .4s ease; }
  .login-btn { width:100%; padding:16px; border-radius:14px; border:none; cursor:pointer; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-size:16px; font-weight:700; letter-spacing:.5px; margin-bottom:16px; font-family:'Inter',sans-serif; transition:transform .15s; }
  .login-btn:hover { transform:scale(1.02); }
  .login-divider { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .login-divider div { flex:1; height:1px; background:#1e3a5f; }
  .login-divider span { font-size:12px; color:#64748b; }
  .social-logins { display:flex; gap:12px; margin-bottom:24px; }
  .social-login-btn { flex:1; padding:14px; border-radius:14px; border:1px solid #1e3a5f; background:#12233d; cursor:pointer; font-size:13px; font-weight:600; color:#94a3b8; font-family:'Inter',sans-serif; }
  /* Splash */
  .splash-screen { height:100%; position:relative; overflow:hidden; background:radial-gradient(ellipse at center,#0d1f3c,#0a1628 70%); display:flex; align-items:center; justify-content:center; }
  .splash-container { width:100%; height:100%; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; animation:fadeOutAll .4s ease 4.6s forwards; }
  .bubble { position:absolute; border-radius:50%; animation:floatBubble 4s ease-in-out infinite; }
  .splash-logo { position:relative; z-index:10; text-align:center; }
  .splash-logo .logo-text { font-family:'Playfair Display',serif; font-size:56px; font-weight:200; color:#fff; letter-spacing:14px; text-shadow:0 0 40px rgba(37,99,235,.3),0 2px 10px rgba(0,0,0,.5); animation:logoReveal 1s ease forwards; }
  .splash-logo .logo-text i { font-weight:100; }
  .splash-logo .logo-sub { font-size:12px; color:rgba(255,255,255,.6); letter-spacing:6px; font-weight:300; animation:subtitleFade .6s ease .8s forwards; opacity:0; }
  /* Header */
  .header-bell { background:#12233d; border:none; border-radius:12px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#cbd5e1; }
  .header { padding:4px 16px 6px; display:flex; justify-content:flex-end; align-items:center; }
  .header-right { display:flex; align-items:center; gap:0; justify-content:space-between; width:100%; }
  .section-title { padding:12px 16px; }
  .section-title h1 { font-size:22px; font-weight:700; color:#fff; }
  .section-title p { font-size:13px; color:#94a3b8; }
  /* Dash.AI */
  .ai-screen { height:100%; display:flex; flex-direction:column; background:radial-gradient(ellipse at center,#0d1f3c,#0a1628 70%); position:relative; }
  .ai-back { position:absolute; top:12px; left:12px; background:rgba(255,255,255,.1); border:none; border-radius:20px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:5; color:#cbd5e1; }
  .ai-content { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 24px; gap:8px; padding-top:40px; padding-bottom:10px; }
  .ai-content.has-chat { justify-content:flex-start; padding-top:50px; flex-shrink:0; }
  .ai-content.has-chat .ai-sphere-wrap { width:25%; margin-bottom:8px; }
  .ai-content.has-chat .ai-title { font-size:14px; }
  .ai-content.has-chat .ai-subtitle { display:none; }
  .ai-chat-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:0 16px 10px; min-height:0; }
  .ai-msg-user { align-self:flex-end; background:linear-gradient(135deg,#2563eb,#3b82f6); color:#fff; padding:10px 14px; border-radius:16px 16px 4px 16px; font-size:13px; max-width:80%; line-height:1.4; }
  .ai-msg-bot { align-self:flex-start; background:#12233d; color:#cbd5e1; padding:12px 14px; border-radius:16px 16px 16px 4px; font-size:13px; max-width:90%; line-height:1.5; }
  .ai-msg-bot .ai-ev-card { display:flex; gap:10px; background:#0a1628; border-radius:12px; padding:10px; margin-top:8px; cursor:pointer; transition:transform .15s; }
  .ai-msg-bot .ai-ev-card:hover { transform:scale(1.02); }
  .ai-msg-bot .ai-ev-card img { width:56px; height:72px; border-radius:8px; object-fit:cover; flex-shrink:0; background:#1e3a5f; }
  .ai-msg-bot .ai-ev-card .ai-ev-info { flex:1; min-width:0; }
  .ai-msg-bot .ai-ev-card .ai-ev-title { font-size:13px; font-weight:600; color:#fff; margin-bottom:2px; }
  .ai-msg-bot .ai-ev-card .ai-ev-desc { font-size:11px; color:#94a3b8; line-height:1.4; margin-bottom:4px; }
  .ai-msg-bot .ai-ev-card .ai-ev-meta { font-size:10px; color:#3b82f6; font-weight:500; }
  .ai-typing { display:flex; gap:4px; padding:8px 0; }
  .ai-typing span { width:6px; height:6px; border-radius:50%; background:#3b82f6; animation:typingDot 1.2s ease-in-out infinite; }
  .ai-typing span:nth-child(2) { animation-delay:.2s; }
  .ai-typing span:nth-child(3) { animation-delay:.4s; }
  @keyframes typingDot { 0%,100%{opacity:.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }
  .ai-sphere-wrap { position:relative; width:50%; aspect-ratio:1; margin-bottom:16px; }
  .ai-sphere { width:100%; height:100%; border-radius:50%; background:radial-gradient(circle at 35% 35%,#60a5fa,#2563eb 50%,#1e3a6e 100%); box-shadow:0 0 60px rgba(37,99,235,.4),0 0 120px rgba(37,99,235,.2),inset 0 -8px 20px rgba(0,0,0,.3),inset 0 8px 20px rgba(96,165,250,.3); animation:spherePulse 3s ease-in-out infinite; }
  .ai-sphere::after { content:''; position:absolute; top:12%; left:20%; width:35%; height:25%; border-radius:50%; background:radial-gradient(ellipse,rgba(255,255,255,.25),transparent); transform:rotate(-15deg); }
  .ai-ring { position:absolute; inset:-12px; border-radius:50%; border:1.5px solid rgba(59,130,246,.2); animation:ringPulse 3s ease-in-out infinite; }
  .ai-ring:nth-child(2) { inset:-24px; border-color:rgba(59,130,246,.1); animation-delay:.5s; }
  .ai-ring:nth-child(3) { inset:-36px; border-color:rgba(59,130,246,.05); animation-delay:1s; }
  .ai-title { font-size:18px; font-weight:700; color:#fff; text-align:center; }

function playBubbleSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    let t=100;
    while(t<4500){
      const delay=t;
      setTimeout(()=>{
        const osc=ctx.createOscillator(),gain=ctx.createGain(),filter=ctx.createBiquadFilter();
        const freq=200+Math.random()*700;
        osc.type="sine";osc.frequency.setValueAtTime(freq,ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq*(1.5+Math.random()),ctx.currentTime+.08);
        filter.type="lowpass";filter.frequency.setValueAtTime(1200,ctx.currentTime);
        const vol=.04+Math.random()*.06;
        gain.gain.setValueAtTime(0,ctx.currentTime);
        gain.gain.linearRampToValueAtTime(vol,ctx.currentTime+.01);
        gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.08+Math.random()*.1);
        osc.connect(filter);filter.connect(gain);gain.connect(ctx.destination);
        osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.2);
      },delay);
      t+=40+Math.random()*200;
    }
    setTimeout(()=>ctx.close(),5500);
  }catch(e){}
}

function doSearch(q){
  const res=document.getElementById("search-results");
  if(!q){render();return;}
  const all=Object.values(EVENTS).flat().filter(e=>e.title.toLowerCase().includes(q.toLowerCase())||e.genre.toLowerCase().includes(q.toLowerCase()));
  if(all.length===0){res.innerHTML=`<p style="text-align:center;color:#64748b;padding:40px;font-size:14px">Nenhum resultado para "${q}"</p>`;return;}
  res.innerHTML=all.map(ev=>`<div class="event-card" style="margin-bottom:10px" onclick="openEvent(${ev.id})">
    <div class="event-img"><img src="${ev.img}" alt="${ev.title}" onerror="this.onerror=null;this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#1e3a5f,#3b82f6)';this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:rgba(255,255,255,0.5)\\'>'+this.alt.charAt(0)+'</div>'"></div>

function parseAIResponse(text){
  const allEvs=Object.values(EVENTS).flat();
  const eventIds=[];
  const cleanText=text.replace(/\[\[ID:(\d+)\]\]/g,(match,id)=>{
    const eid=parseInt(id);
    if(!eventIds.includes(eid)) eventIds.push(eid);
    return "";
  }).replace(/\s{2,}/g," ").trim();
  const events=eventIds.map(id=>{
    const ev=allEvs.find(e=>e.id===id);
    if(!ev) return null;
    return {id:ev.id,title:ev.title,desc:ev.desc,local:ev.local,hours:ev.date,img:ev.img};
  }).filter(Boolean);
  return {text:cleanText,events:events.length?events:null};
}

async function sendAI(){
  const input=document.getElementById("ai-q");
  const q=input?input.value.trim():"";
  if(!q) return;
  aiMessages.push({type:"user",text:q});
  aiConversation.push({role:"user",content:q});
  aiMessages.push({type:"bot",typing:true,text:""});
  renderAI(document.getElementById("app"));
  try{
    const resp=await fetch("https://dash-proxy.rgoncalves05.workers.dev",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:512,
        system:buildSystemPrompt(),
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:aiConversation.slice(-10)
      })
    });
    const data=await resp.json();
    if(data.error){throw new Error(data.error.message||"Erro na API");}
    const raw=data.content[0].text;
    aiConversation.push({role:"assistant",content:raw});
    const parsed=parseAIResponse(raw);
    aiMessages.pop();
    aiMessages.push({type:"bot",text:parsed.text,events:parsed.events});
  }catch(err){
    aiMessages.pop();
    aiMessages.push({type:"bot",text:"Desculpe, tive um problema ao processar sua pergunta. Tente novamente! ("+err.message+")"});
  }
  renderAI(document.getElementById("app"));
}

function renderDetail(app){
  const all=Object.values(EVENTS).flat();
  const ev=all.find(e=>e.id===state.event);
  if(!ev) return;
  const comments=COMMENTS[ev.id]||[];
  let commentsHtml=comments.length?`<div class="comments-section"><div class="comments-title">Comentarios <span>(${comments.length})</span></div>
  ${comments.map(c=>`<div class="comment-card"><div class="comment-header"><div class="comment-avatar">${c.avatar}</div><div><span class="comment-user">${c.user}</span><span class="comment-time">${c.time}</span></div>${c.rating?`<div style="display:flex;align-items:center;gap:3px;background:#0a1628;padding:4px 8px;border-radius:8px;margin-left:auto;border:1px solid #f59e0b33"><span style="font-size:11px;color:#f59e0b">★</span><span style="font-size:12px;color:#f59e0b;font-weight:700">${c.rating}</span></div>`:""}</div><p class="comment-text">${c.text}</p><div class="comment-likes">${ic("i-heart",12)} ${c.likes}</div></div>`).join("")}</div>`:"";

  // Extra info block
  let extraHtml="";
  if(ev.extra){
    const rows=Object.entries(ev.extra).map(([k,v])=>{
      const labels={ano:"Ano",duracao:"Duração",diretor:"Diretor",produtor:"Produtora",elenco:"Elenco",idioma:"Idioma",classificacao:"Classif.",autor:"Autor",direcao:"Direção",temporada:"Temporada",curador:"Curador",obras:"Obras",periodo:"Período",visitacao:"Visitação",origem:"Origem",artistas:"Artistas",abertura:"Abertura",capacidade:"Capacidade",tour:"Tour"};
      return `<div class="extra-row"><span class="extra-label">${labels[k]||k}</span><span class="extra-value">${v}</span></div>`;
    }).join("");
    extraHtml=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <button class="ver-mais-btn" onclick="state.showExtra=!state.showExtra;render()">${state.showExtra?"▲ ver menos":"▼ ver mais"}</button>
    </div>
    ${state.showExtra?`<div class="extra-info">${rows}</div>`:""}`;
  }

  // Rating block
  const currentRating=userRatings[ev.id]||0;
  const ratingHtml=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:4px;background:#12233d;padding:6px 10px;border-radius:12px">${ic("i-star",14)} <span style="font-size:14px;color:#f59e0b;font-weight:700">${ev.rating}</span></div>
    ${currentRating
      ?`<div style="display:flex;align-items:center;gap:4px;background:#12233d;padding:6px 10px;border-radius:12px;border:1px solid #f59e0b44;cursor:pointer" onclick="state.showRating=!state.showRating;render()"><span style="font-size:12px;color:#f59e0b">★</span><span style="font-size:13px;color:#f59e0b;font-weight:700">${currentRating}</span><span style="font-size:10px;color:#64748b;margin-left:2px">sua nota</span></div>`
      :`<button class="ver-mais-btn" onclick="state.showRating=!state.showRating;render()">⭐ avaliar</button>`
    }
  </div>
  ${state.showRating?`<div class="rating-popup">
    <div class="rating-popup-title">Sua avaliação</div>
    <div class="star-row">
      ${[1,2,3,4,5].map(s=>`<button class="star-pick" onclick="state.userRating=${s};render()">${s<=(state.userRating||currentRating)?"⭐":"☆"}</button>`).join("")}
    </div>
    <button class="rating-send-btn" onclick="userRatings[${ev.id}]=state.userRating;state.showRating=false;state.userRatingDone=true;render()">Confirmar avaliação</button>
  </div>`:""}`;

  // Dash.AI contextualizado
  const aiBtn=`<button class="detail-ai-btn" onclick="openDetailAI(${ev.id})">${ic("i-sparkle",18)} Perguntar ao Dash.AI sobre este evento</button>`;

  app.innerHTML=`<div class="screen" style="display:flex;flex-direction:column">
  <div class="detail-hero"><img src="${ev.img}" alt="${ev.title}" onerror="this.onerror=null;this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#1e3a5f,#3b82f6)';this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:rgba(255,255,255,0.5)\\'>'+this.alt.charAt(0)+'</div>'"><div class="gradient"></div>
  <button class="back-btn" onclick="state.screen='app';state.liked=false;state.saved=false;state.bought=false;render()">${ic("i-back",20)}</button>
  <button class="save-btn ${state.saved?"saved":""}" onclick="state.saved=!state.saved;render()">${ic("i-bookmark",18)}</button></div>
  <div class="detail-body">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:4px"><div><div class="detail-title">${ev.title}</div><div class="detail-genre">${ev.genre}</div></div></div>
    ${ratingHtml}
    <div class="info-cards">
      <div class="info-card"><span style="color:#3b82f6">${ic("i-calendar",16)}</span><span>${ev.date}</span></div>
      <div class="info-card"><span style="color:#ef4444">${ic("i-map",16)}</span><span>${ev.local}</span></div>
      <div class="info-card"><span style="color:#22c55e">${ic("i-dollar",16)}</span><span>${ev.price}</span></div>
    </div>
    <p class="detail-desc">${ev.desc}</p>
    ${extraHtml}
    ${aiBtn}
    <div class="social-actions">
      <button class="social-btn ${state.liked?"liked":""}" onclick="state.liked=!state.liked;render()">${ic("i-heart",16)} ${state.liked?"Curtido!":"Curtir"}</button>
      <button class="social-btn" onclick="state.showComment=!state.showComment;render()">${ic("i-msg",16)} Comentar</button>
      <button class="social-btn">${ic("i-share",16)} Enviar</button>
    </div>
    ${state.showComment?`<div class="rating-popup">
      <div class="rating-popup-title">Seu comentário</div>
      <div class="star-row">
        ${[1,2,3,4,5].map(s=>`<button class="star-pick comment-star" onclick="state.commentRating=${s};document.querySelectorAll('.comment-star').forEach((el,i)=>{el.textContent=i<${s}?'⭐':'☆'})">${s<=(state.commentRating||0)?"⭐":"☆"}</button>`).join("")}
      </div>
      <textarea id="comment-text" style="width:100%;background:#0a1628;border:1px solid #1e3a5f;border-radius:12px;padding:10px 12px;color:#fff;font-size:13px;font-family:'Inter',sans-serif;resize:none;outline:none;min-height:70px;margin-bottom:10px" placeholder="Escreva sua opinião sobre o evento..."></textarea>
      <button class="rating-send-btn" onclick="submitComment(${ev.id})">Publicar comentário</button>
    </div>`:""}
    ${commentsHtml}
    <button class="cta-btn ${state.bought?"bought":""}" onclick="state.bought=!state.bought;render()">${state.bought?"Ingresso Comprado ✓":"Comprar Ingresso"}</button>
  </div></div>`;
}

function openDetailAI(evId){
  const all=Object.values(EVENTS).flat();
  const ev=all.find(e=>e.id===evId);
  if(!ev) return;
  aiMessages=[];
  aiConversation=[];
  state.aiTribo=null;
  state.screen="ai";
  state.aiContextEvent=ev;
  // Injeta mensagem inicial
  const initMsg=`Em que posso lhe ajudar sobre "${ev.title}"?`;
  aiMessages.push({type:"bot",text:initMsg});
  aiConversation.push({role:"assistant",content:initMsg});
  render();
}

function openEvent(id){state.screen="detail";state.event=id;state.liked=false;state.saved=false;state.bought=false;state.showExtra=false;state.showRating=false;state.showComment=false;state.commentRating=0;state.userRating=0;state.userRatingDone=!!(userRatings[id]);if(userRatings[id])state.userRating=userRatings[id];render();}

function renderTabBar(){
  const tabs=[{id:"home",icon:"i-home",label:"Início"},{id:"search",icon:"i-search",label:"Buscar"},{id:"calendar",icon:"i-calendar",label:"Agenda"},{id:"profile",icon:"i-user",label:"Perfil"}];
  return `<div class="tab-bar">${tabs.map(t=>`<button class="tab-btn ${state.tab===t.id?"active":""}" onclick="state.tab='${t.id}';render()">${ic(t.icon,22)}<span>${t.label}</span></button>`).join("")}</div>`;
}

function submitComment(evId){
  const txt=document.getElementById("comment-text");
  if(!txt||!txt.value.trim()) return;
  if(!COMMENTS[evId]) COMMENTS[evId]=[];
  COMMENTS[evId].unshift({user:"Beto",avatar:"B",time:"agora",rating:state.commentRating||0,text:txt.value.trim(),likes:0});
  state.showComment=false;state.commentRating=0;
  render();
}

function submitPost(){
  const txt=document.getElementById("compose-text");
  if(!txt||!txt.value.trim()) return;
  const rating=state.postRating||0;
  FEED_POSTS.unshift({id:Date.now(),user:"Beto",avatar:"B",time:"agora",text:txt.value.trim(),evId:null,likes:0,comments:0,rating});
  txt.value="";
  const charEl=document.getElementById("compose-char2");
  if(charEl) charEl.textContent="0/280";
  state.postRating=0;
  render();
}

function bindEvents(){}
render();
